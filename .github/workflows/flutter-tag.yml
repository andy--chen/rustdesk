name: Flutter Tag Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Custom release version. Empty means derive from branch, for example custom-1.4.8 -> 1.4.8-custom.1"
        required: false
        default: ""

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Resolve custom release version
        id: version
        shell: bash
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
          VERSION_SECRET: ${{ secrets.CUSTOM_VERSION }}
        run: |
          set -euo pipefail
          version="${VERSION_INPUT}"
          if [ -z "$version" ]; then
            if [[ "$GITHUB_REF_NAME" == custom-* ]]; then
              version="${GITHUB_REF_NAME#custom-}-custom.1"
            elif [ -n "$VERSION_SECRET" ]; then
              version="$VERSION_SECRET"
            else
              version="1.4.8-custom.1"
            fi
          fi
          release_tag="$version"
          if [[ "$release_tag" != v* ]]; then
            release_tag="v${release_tag}"
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "Resolved custom release tag: $release_tag"

  run-custom-rustdesk-build:
    needs: resolve-version
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: ${{ needs.resolve-version.outputs.release_tag }}
      desktop_only: true
