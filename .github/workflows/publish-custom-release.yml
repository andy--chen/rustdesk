name: Publish Custom RustDesk Release

on:
  workflow_run:
    workflows:
      - Flutter Tag Build
    branches:
      - "custom-*"
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Completed Flutter Build run id to publish'
        required: true
      version:
        description: 'Custom version, for example 1.4.8-custom.1'
        required: false
        default: ''

permissions:
  actions: read
  contents: read

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      PUBLIC_BASE_URL: https://rustdesk.shbupin.com

    steps:
      - name: Resolve custom release version
        shell: bash
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
          VERSION_SECRET: ${{ secrets.CUSTOM_VERSION }}
          BUILD_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION_INPUT}"
          if [ -z "$version" ]; then
            if [[ "$BUILD_BRANCH" == custom-* ]]; then
              version="${BUILD_BRANCH#custom-}-custom.1"
            elif [ -n "$VERSION_SECRET" ]; then
              version="$VERSION_SECRET"
            else
              version="1.4.8-custom.1"
            fi
          fi
          echo "CUSTOM_VERSION=$version" >> "$GITHUB_ENV"
          echo "Resolved custom release version: $version"

      - name: Download artifacts from completed build
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: artifacts
          merge-multiple: false

      - name: Download artifacts from selected build
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.inputs.run_id }}
          path: artifacts
          merge-multiple: false

      - name: Download release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "$CUSTOM_VERSION" \
            --repo "${{ github.repository }}" \
            --dir release-assets \
            --pattern "rustdesk*" || true
          if [ ! "$(find release-assets -type f -print -quit)" ]; then
            gh release download "v$CUSTOM_VERSION" \
              --repo "${{ github.repository }}" \
              --dir release-assets \
              --pattern "rustdesk*" || true
          fi

      - name: Generate download files and update manifests
        shell: python
        run: |
          import hashlib
          import json
          import os
          import re
          import shutil
          import sys
          import zipfile
          from pathlib import Path

          version = os.environ["CUSTOM_VERSION"].strip()
          base_url = os.environ["PUBLIC_BASE_URL"].rstrip("/")
          if not version:
              raise SystemExit("CUSTOM_VERSION is empty")

          source_dirs = [Path("release-assets"), Path("artifacts")]
          upload_download = Path("upload/download")
          upload_update = Path("upload/update")
          upload_download.mkdir(parents=True, exist_ok=True)
          upload_update.mkdir(parents=True, exist_ok=True)

          suffixes = {
              ".exe",
              ".msi",
              ".dmg",
              ".pkg",
              ".deb",
              ".rpm",
              ".appimage",
              ".apk",
              ".zip",
          }

          def sha256(path):
              digest = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()

          def arch_from_name(name):
              lower = name.lower()
              if re.search(r"(aarch64|arm64)", lower):
                  return "aarch64"
              if re.search(r"(x86_64|x64|amd64)", lower):
                  return "x86_64"
              if re.search(r"(armv7|armeabi|armhf)", lower):
                  return "arm"
              if re.search(r"(^|[-_])x86($|[-_.])|i686", lower):
                  return "x86"
              return ""

          def classify(path):
              name = path.name
              lower = name.lower()
              ext = ".appimage" if lower.endswith(".appimage") else path.suffix.lower()
              arch = arch_from_name(name)

              if ext in {".exe", ".msi"}:
                  return [("windows", arch or "x86_64", ext)]
              if ext == ".zip" and "windows" in lower:
                  return [("windows", arch or "x86_64", ext)]
              if ext in {".dmg", ".pkg"}:
                  return [("macos", arch or "x86_64", ext)]
              if ext in {".deb", ".rpm", ".appimage"}:
                  return [("linux", arch or "x86_64", ext)]
              if ext == ".apk":
                  if "universal" in lower:
                      return [
                          ("android", "aarch64", ext),
                          ("android", "arm", ext),
                          ("android", "x86_64", ext),
                          ("android", "x86", ext),
                      ]
                  return [("android", arch or "aarch64", ext)]
              return []

          def rank(ext):
              return {
                  ".exe": 100,
                  ".dmg": 100,
                  ".appimage": 100,
                  ".apk": 100,
                  ".zip": 95,
                  ".msi": 90,
                  ".pkg": 90,
                  ".deb": 80,
                  ".rpm": 70,
              }.get(ext, 0)

          def zip_windows_portable_dir(app_dir, arch):
              upload_name = f"rustdesk-{version}-windows-{arch}.zip"
              dest = upload_download / upload_name
              with zipfile.ZipFile(dest, "w", compression=zipfile.ZIP_DEFLATED) as zipf:
                  for path in sorted(app_dir.rglob("*")):
                      if path.is_file():
                          zipf.write(path, path.relative_to(app_dir))
              return dest

          packages = []
          seen_windows_arches = set()
          for source_dir in source_dirs:
              if not source_dir.exists():
                  continue
              for exe in source_dir.rglob("rustdesk.exe"):
                  hint = str(exe.parent.relative_to(source_dir)).lower()
                  if "windows" not in hint:
                      continue
                  arch = arch_from_name(hint) or "x86_64"
                  if arch in seen_windows_arches:
                      continue
                  packages.append(zip_windows_portable_dir(exe.parent, arch))
                  seen_windows_arches.add(arch)
              for path in source_dir.rglob("*"):
                  if not path.is_file():
                      continue
                  lower = path.name.lower()
                  if lower in {"rustdesk.exe", "rustdesk"}:
                      continue
                  if not any(lower.endswith(suffix) for suffix in suffixes):
                      continue
                  if lower.endswith(".apk") and "unsigned" in lower:
                      continue
                  packages.append(path)

          if not packages:
              raise SystemExit("No release package artifacts found")

          manifests = {}
          copied = {}

          for package in sorted(packages):
              targets = classify(package)
              if not targets:
                  continue
              first_os, first_arch, first_ext = targets[0]
              source_ext = ".AppImage" if first_ext == ".appimage" else package.suffix
              if first_ext == ".apk" and "universal" in package.name.lower():
                  upload_name = f"rustdesk-{version}-android-universal{source_ext}"
              else:
                  upload_name = f"rustdesk-{version}-{first_os}-{first_arch}{source_ext}"
              dest = upload_download / upload_name
              if upload_name not in copied:
                  if package.resolve() != dest.resolve():
                      shutil.copy2(package, dest)
                  copied[upload_name] = {
                      "url": f"{base_url}/download/{upload_name}",
                      "sha256": sha256(dest),
                      "rank": rank(first_ext),
                  }

              for os_name, arch, ext in targets:
                  platform = f"{os_name}-{arch}"
                  candidate = {
                      "version": version,
                      "platform": platform,
                      "url": copied[upload_name]["url"],
                      "sha256": copied[upload_name]["sha256"],
                      "force": False,
                      "notes": "Built-in rustdesk.shbupin.com ID, relay, and API server settings.",
                      "_rank": rank(ext),
                  }
                  current = manifests.get(platform)
                  if current is None or candidate["_rank"] > current["_rank"]:
                      manifests[platform] = candidate

          if not manifests:
              raise SystemExit("No update manifests generated")

          for platform, manifest in sorted(manifests.items()):
              manifest.pop("_rank", None)
              output = upload_update / f"{platform}.json"
              output.write_text(
                  json.dumps(manifest, indent=2, ensure_ascii=False) + "\n",
                  encoding="utf-8",
              )
              print(f"Generated {output}: {manifest['url']}")

      - name: Show upload tree
        shell: bash
        run: |
          find upload -maxdepth 3 -type f -print | sort

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: 'upload/download/*,upload/update/*'
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Verify remote upload
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            mkdir -p '${{ secrets.DEPLOY_PATH }}/download' '${{ secrets.DEPLOY_PATH }}/update'
            download_count=$(find '${{ secrets.DEPLOY_PATH }}/download' -maxdepth 1 -type f | wc -l)
            update_count=$(find '${{ secrets.DEPLOY_PATH }}/update' -maxdepth 1 -type f | wc -l)
            echo "download files: ${download_count}"
            echo "update manifests: ${update_count}"
            test "${download_count}" -gt 0
            test "${update_count}" -gt 0
